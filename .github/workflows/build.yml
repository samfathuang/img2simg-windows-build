name: Build img2simg.exe

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        install: mingw-w64-x86_64-gcc mingw-w64-x86_64-zlib mingw-w64-x86_64-zlib-devel
    
    - name: Download AOSP source files
      shell: msys2 {0}
      run: |
        mkdir -p src
        cd src
        
        # Using GitHub mirrors as fallback
        echo "Downloading source files..."
        
        curl -L -o img2simg.c https://raw.githubusercontent.com/android/platform_system_core/main/libsparse/img2simg.c
        curl -L -o sparse.c https://raw.githubusercontent.com/android/platform_system_core/main/libsparse/sparse.c
        curl -L -o sparse_crc32.c https://raw.githubusercontent.com/android/platform_system_core/main/libsparse/sparse_crc32.c
        curl -L -o sparse.h https://raw.githubusercontent.com/android/platform_system_core/main/libsparse/sparse.h
        curl -L -o sparse_err.h https://raw.githubusercontent.com/android/platform_system_core/main/libsparse/sparse_err.h
        curl -L -o output_file.h https://raw.githubusercontent.com/android/platform_system_core/main/libsparse/output_file.h
        
        echo "Download complete"
        ls -lah
    
    - name: Compile img2simg.exe
      shell: msys2 {0}
      run: |
        cd src
        echo "Starting compilation..."
        gcc -Wall -Wextra -o img2simg.exe img2simg.c sparse.c sparse_crc32.c -lz
        
        if [ -f img2simg.exe ]; then
          echo "Compilation successful!"
          ls -lh img2simg.exe
          file img2simg.exe
        else
          echo "Compilation failed!"
          exit 1
        fi
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: img2simg-windows
        path: src/img2simg.exe
        retention-days: 90
    
    - name: Create Release
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        files: src/img2simg.exe
        tag_name: v1.0.0-${{ github.run_number }}
        body: |
          Windows build of img2simg from AOSP
          
          Built from: https://android.googlesource.com/platform/system/core/+/main/libsparse/
          
          Build details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
